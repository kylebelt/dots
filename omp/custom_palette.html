<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tokyo Night — Color Palette</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #15161e;
      --surface: #1a1b26;
      --border:  #283457;
      --text:    #c0caf5;
      --dim:     #414868;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.4;
    }

    /* Top rainbow strip */
    .strip {
      height: 3px;
      background: linear-gradient(90deg,
        #f7768e 0%, #F1502F 12%,
        #e0af68 24%, #9ece6a 36%,
        #06A4CE 48%, #7dcfff 60%,
        #7aa2f7 72%, #bb9af7 84%, #f7768e 100%
      );
    }

    header {
      padding: 72px 64px 56px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      gap: 40px;
      flex-wrap: wrap;
    }

    .header-left .eyebrow {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 9vw, 108px);
      font-weight: 300;
      line-height: 0.9;
      letter-spacing: -0.03em;
    }

    h1 em {
      font-style: italic;
      font-weight: 300;
      color: #7aa2f7;
    }

    .header-right {
      text-align: right;
    }

    .header-right .count {
      font-size: 64px;
      font-weight: 300;
      color: var(--border);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .header-right .count-label {
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 4px;
    }

    main {
      padding: 48px 64px 80px;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .group {
      margin-bottom: 56px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 3px;
    }

    /* ── Swatch Card ── */
    .swatch {
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: var(--surface);
      opacity: 0;
      animation: rise 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      outline: none;
    }

    .swatch:focus-visible {
      outline: 2px solid var(--text);
      outline-offset: 2px;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .swatch-block {
      height: 148px;
      position: relative;
      overflow: hidden;
    }

    /* large italic name that fades in on hover */
    .swatch-block-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 12px 14px;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 28px;
      font-weight: 300;
      line-height: 1;
      color: rgba(255,255,255,0.0);
      transition: color 0.25s ease;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .swatch:hover .swatch-block-label {
      color: rgba(255,255,255,0.85);
    }

    .swatch-block::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .swatch:hover .swatch-block::after {
      opacity: 1;
    }

    .swatch-meta {
      padding: 14px 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .swatch-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 4px;
      text-transform: capitalize;
    }

    .swatch-hex {
      font-size: 10.5px;
      color: var(--dim);
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }

    .swatch:hover .swatch-hex {
      color: var(--text);
    }

    /* copy pill */
    .copy-pill {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(15, 16, 26, 0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 3px 8px;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      pointer-events: none;
    }

    .swatch:hover .copy-pill {
      opacity: 1;
    }

    .swatch.copied .copy-pill {
      opacity: 1;
      background: rgba(158, 206, 106, 0.25);
      border-color: rgba(158, 206, 106, 0.4);
      color: #9ece6a;
    }

    /* ── Lift on hover ── */
    .swatch {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .swatch:hover {
      transform: translateY(-5px);
      z-index: 2;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 10px 22px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--dim);
      text-transform: uppercase;
    }

    footer span { color: #7aa2f7; }
  </style>
</head>
<body>

<div class="strip"></div>

<header>
  <div class="header-left">
    <div class="eyebrow">Color System · 2026</div>
    <h1>Tokyo<br><em>Night</em></h1>
  </div>
  <div class="header-right">
    <div class="count">22</div>
    <div class="count-label">colors</div>
  </div>
</header>

<main>
  <div class="group">
    <div class="section-label">Darks &amp; Neutrals</div>
    <div class="grid" id="grid-darks"></div>
  </div>
  <div class="group">
    <div class="section-label">Chromatic</div>
    <div class="grid" id="grid-chroma"></div>
  </div>
</main>

<footer>
  <div>Click any swatch to copy hex</div>
  <div>Tokyo Night · <span>#c0caf5</span></div>
</footer>

<div class="toast" id="toast"></div>

<script>
  const darks = [
    { name: "near_black",         hex: "#15161e" },
    { name: "dark_midnight_navy", hex: "#1a1b26" },
    { name: "deep_twilight",       hex: "#292e42" },
    { name: "dark_cobalt_blue",   hex: "#283457" },
    { name: "slate_blue_gray",    hex: "#414868" },
    { name: "slate_violet",        hex: "#565f89" },
    { name: "medium_gray",        hex: "#6c6c6c" },
    { name: "muted_periwinkle",   hex: "#a9b1d6" },
    { name: "lavender",           hex: "#c0caf5" },
    { name: "soft_lavender",      hex: "#c0caf5bb" },
  ];

  const chroma = [
    { name: "vermilion",      hex: "#F1502F" },
    { name: "crimson",        hex: "#db4b4b" },
    { name: "soft_red",       hex: "#f7768e" },
    { name: "peach_orange",   hex: "#ff9e64" },
    { name: "amber",          hex: "#e0af68" },
    { name: "yellow_green",   hex: "#9ece6a" },
    { name: "seafoam_teal",   hex: "#73daca" },
    { name: "cerulean",       hex: "#06A4CE" },
    { name: "sky_cyan",       hex: "#7dcfff" },
    { name: "pale_azure",     hex: "#89ddff" },
    { name: "cornflower_blue",hex: "#7aa2f7" },
    { name: "soft_violet",    hex: "#bb9af7" },
  ];

  const toast = document.getElementById('toast');
  let toastTimer;

  function hexToCSS(hex) {
    if (hex.length === 9) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const a = (parseInt(hex.slice(7, 9), 16) / 255).toFixed(2);
      return `rgba(${r},${g},${b},${a})`;
    }
    return hex;
  }

  function buildGrid(colors, gridId, startIndex = 0) {
    const grid = document.getElementById(gridId);
    colors.forEach((color, i) => {
      const cssColor = hexToCSS(color.hex);
      const displayName = color.name.replace(/_/g, ' ');

      const el = document.createElement('div');
      el.className = 'swatch';
      el.setAttribute('tabindex', '0');
      el.setAttribute('role', 'button');
      el.setAttribute('aria-label', `Copy ${color.name} ${color.hex}`);
      el.style.animationDelay = `${(startIndex + i) * 45}ms`;

      el.innerHTML = `
        <div class="swatch-block" style="background:${cssColor}">
          <div class="swatch-block-label">${displayName}</div>
          <div class="copy-pill">copy</div>
        </div>
        <div class="swatch-meta">
          <div class="swatch-name">${displayName}</div>
          <div class="swatch-hex">${color.hex}</div>
        </div>
      `;

      const copy = () => {
        navigator.clipboard.writeText(color.hex).catch(() => {});
        el.classList.add('copied');
        el.querySelector('.copy-pill').textContent = 'copied';
        setTimeout(() => {
          el.classList.remove('copied');
          el.querySelector('.copy-pill').textContent = 'copy';
        }, 1400);

        clearTimeout(toastTimer);
        toast.textContent = `${color.hex} copied`;
        toast.classList.add('show');
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
      };

      el.addEventListener('click', copy);
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') copy(); });

      grid.appendChild(el);
    });
  }

  buildGrid(darks, 'grid-darks', 0);
  buildGrid(chroma, 'grid-chroma', darks.length);
</script>
</body>
</html>
