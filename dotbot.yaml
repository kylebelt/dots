- defaults:
    link:
      create: true
      relink: true
      backup: true
    shell:
      quiet: true

- clean: ['~', '~/.config']

- create:
    - ~/.config
    - ~/.cache
    - ~/.local/share
    - ~/.local/state
    - ~/.config/aws

- shell:
    - [git submodule update --init --recursive, Installing submodules]

- plugins:
    - dotbot-plugins/dotbot-brew/

- link:
    ~/.config/atuin:
    ~/.config/bat:
    ~/.bash_profile: bash/bash_profile
    ~/.bash_functions: bash/bash_functions
    ~/.config/bottom:
    ~/.config/cmux:
    ~/.config/eza:
    ~/.config/fastfetch:
    ~/.config/ghostty:
    ~/.config/karabiner:
    ~/.config/lazygit:
    ~/.config/nvim:
    ~/.config/omp:
    ~/.config/p10k:
    ~/.config/sesh:
    ~/.config/starship.toml:
      path: starship/starship.toml
      force: true
    ~/.config/tealdeer:
    ~/.config/tmux/tmux.conf: tmux/tmux.conf
    ~/.config/television:
    ~/.vimrc: vim/vimrc
    ~/.vim_functions: vim/vim_functions
    ~/.vundle: vim/vundle
    ~/.config/yazi:
    ~/.config/zsh/:
      glob: true
      path: zsh/*
      exclude:
        - zsh/zshrc
        - zsh/zshenv
        - zsh/zprofile
        - zsh/fzf_profile.sh
    ~/.zshenv: zsh/zshenv
    ~/.config/zsh/.zshrc: zsh/zshrc
    ~/.config/zsh/.zprofile: zsh/zprofile
    ~/.local/bin/fzf-preview.sh: zsh/fzf-preview.sh
    ~/.config/zsh-patina:

- brewfile:
    - brew/Brewfile
