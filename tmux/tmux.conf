# SECTION: Term/Mouse Config

# Set True Colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on
set -gq allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Set path for plugins
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# SECTION: UX Settings

# Set first window as 1 instead of 0
set -g base-index 1
set -g pane-base-index 1

set -g set-clipboard on

setw -g mode-keys vi

# Change leader to tilde
set -g prefix `
bind ` send-prefix

# Set vi mode
set-window-option -g mode-keys vi

# Set status bar at top
set-option -g status-position top

# Set titles
set-option -g set-titles on
set-option -g set-titles-string "#W"  # #S = session, #W = window name

# Auto adjust window numbers
set -g renumber-windows on

# Increase repeat time to save prefix presses
set -g repeat-time 1000

# Increase history size
set -g history-limit 10000

set -g window-status-bell-style "fg=red"

# SECTION: Keybinds

# Avoid accidental escape sequences
set -g escape-time 0

# binds r to reload config
unbind r
# bind -N 'Reload tmux config!' r 'source-file ~/.config/tmux/tmux.conf; display "Config reloaded!"'

# Shift Alt vim keys to switch windows
bind -N 'Previous Window' -n M-H previous-window
bind -N 'Next Window' -n M-L next-window
bind -N 'Previous Window' -n M-\{ previous-window
bind -N 'Next Window' -n M-\} next-window

# Leader + Shift {/} to move window left/right
bind -N "Move Window Right" M-\} swap-window -t +1 \; next-window
bind -N "Move Window Left" M-\{ swap-window -t -1 \; previous-window

# Keybinds
bind -N 'Paste the most recent paste buffer' 'P' paste-buffer -p
bind-key -N 'Visual selection vi-style' -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -N 'Toggle block selection in visual selection mode' -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle
bind-key -N 'Yank selection' -T copy-mode-vi 'y' send-keys -X copy-selection

# Drag copy using mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# Open Panes in current directory
bind -N "Split panes horizontally" '\' split-window -h -c "#{pane_current_path}"
bind -N "Split panes vertically" '-' split-window -v -c "#{pane_current_path}"
bind -N "Create a new window" c new-window -c "#{pane_current_path}"

# Kill window binds
bind -N 'Kill current window' q confirm-before -y -p "Kill Window #W? (y/n)" kill-window
bind -N 'Kill all but the current window' Q confirm-before -y -p "Kill all windows but #W? (y/n)" 'kill-window -a'

# Kill pane binds
bind -N 'Kill pane' x confirm-before -y -p "Kill Pane #P? (y/n)" kill-pane
bind -N 'Kill all but the current pane' X confirm-before -y -p "Kill all panes but #P? (y/n)" 'kill-pane -a'

# Kill session
bind -N 'Kill session' 'k' confirm-before -y -p "Kill Session #S? (y/n)" kill-session

# Rebind pane selector
bind -N 'Pane selector' e display-panes

# Rebind zoom(full screen) and find window
bind -N 'Zoom window (Full Screen)' 'F' resize-pane -Z
bind -N 'Find Window' 'W' command-prompt { find-window -Z "%%" }

# Restore Clear Scream with <leader>l
bind -N "Clear Screen" 'L' send-keys 'C-l'

# Last <something> keybinds
bind -N "Select the previously current window" 'l' last-window
bind -N "Select the previously current pane" ";" last-pane
bind -N "Last Session (via sesh)" "\'" run-shell "sesh last"

# tmux display popups
bind C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi" # yazi float
bind C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh" # quick floating terminal
bind C-g display-popup -d "#{pane-current-path}" -w 90% -h 90% -E "lazygit" # lazygit float

# Fuzzy find configs
bind d display-popup -w 90% -h 90% -E "fd --type file --exclude .git --exclude node_modules --exclude .venv --exclude .DS_Store . ~/.config ~/.dotfiles | \
  fzf -d / --with-nth 5.. --height=100% --multi --cycle --preview-window=right:60% \
  --layout=reverse --info=right --prompt='❱ ' --pointer='▶' --marker='✓' --separator='┄' --padding=1 \
  --preview 'fzf-preview.sh {}' --header '?:Preview | C-a:Select All | C-d/u:Scroll' \
  --bind '?:toggle-preview,ctrl-a:select-all,ctrl-d:preview-half-page-down,ctrl-u:preview-half-page-up' \
  --bind 'tab:toggle+down,shift-tab:toggle+up' | xargs nvim"

# Sesh fzf
bind-key "s" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

# Sesh tv
bind-key "S" display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh

# SECTION: TPM Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME}/tmux/plugins/"

set -g @tpm_plugins '
  tmux-plugins/tpm
  tmux-plugins/tmux-sensible
  tmux-plugins/tmux-resurrect
  tmux-plugins/tmux-continuum
  tmux-plugins/tmux-open
  tmux-plugins/tmux-yank
  mrjones2014/smart-splits.nvim
  wfxr/tmux-fzf-url
  sainnhe/tmux-fzf
  omerxx/tmux-floaxx
  laktak/extrakto
  nhdaly/tmux-better-mouse-mode
  jaclu/tmux-menus
  schasse/tmux-jump
'

# SECTION: Themes

# Tokyo Night
set -g @plugin 'janoamaral/tokyo-night-tmux' # Theme
set -g @tokyo-night-tmux_theme night    # storm | day | default to 'night'
set -g @tokyo-night-tmux_transparent 1  # 1 or 0
set -g @tokyo-night-tmux_show_git 1 #show git info

# SECTION: Plugins settings

# Smart Splits config
set -g @smart-splits_no_wrap '' # to disable wrapping. (any value disables wrapping)

set -g @smart-splits_move_left_key  'C-h' # key-mapping for navigation.
set -g @smart-splits_move_down_key  'C-j' #  --"--
set -g @smart-splits_move_up_key    'C-k' #  --"--
set -g @smart-splits_move_right_key 'C-l' #  --"--

set -g @smart-splits_resize_left_key  'M-h' # key-mapping for resizing.
set -g @smart-splits_resize_down_key  'M-j' #  --"--
set -g @smart-splits_resize_up_key    'M-k' #  --"--
set -g @smart-splits_resize_right_key 'M-l' #  --"--

set -g @smart-splits_resize_step_size '3'

# tmux-continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# tmux-ressurect
set -g @resurrect-strategy-nvim 'session'

# tmux-fzf-url
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# tmux-better-mouse-mode
set -g @scroll-down-exit-copy-mode on
set -g @scroll-without-changing-pane on
set -g @scroll-in-moused-over-pane on
set -g @scroll-speed-num-lines-per-scroll 1
set -g @emulate-scroll-for-no-mouse-alternate-buffer on

# tmux-menus
set -g @menus_trigger '|'

# FZF Launch key
TMUX_FZF_LAUNCH_KEY='f'

# Yanky
set -g @yank_action "copy-pipe" # Prevent scrolling to bottom after copying

# Run TPM, keep at the end of the config
run '/opt/homebrew/opt/tpm/share/tpm/tpm'
